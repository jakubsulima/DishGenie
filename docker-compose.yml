services:
  backend:
    image: "${BACKEND_IMAGE:-ghcr.io/change-me/recipeai-backend:latest}"
    pull_policy: always
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    environment:
      POSTGRES_URL: "jdbc:postgresql://db:5432/${POSTGRES_DB}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/${POSTGRES_DB}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-prod}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      TRUSTED_PROXY_IPS: "${TRUSTED_PROXY_IPS:-}"
      JWT_COOKIE_SECURE: "${JWT_COOKIE_SECURE:-true}"
      JWT_COOKIE_SAME_SITE: "${JWT_COOKIE_SAME_SITE:-Lax}"
      FREE_PLAN_RECIPE_LIMIT: "${FREE_PLAN_RECIPE_LIMIT:-75}"
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.recipeai-backend.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`${TRAEFIK_BACKEND_PATH_PREFIX:-/api}`)"
      - "traefik.http.routers.recipeai-backend.priority=${TRAEFIK_BACKEND_ROUTER_PRIORITY:-100}"
      - "traefik.http.services.recipeai-backend.loadbalancer.server.port=${BACKEND_INTERNAL_PORT:-8080}"
    networks:
      - frontend-backend
      - backend-db
      - dokploy-network

  frontend:
    image: "${FRONTEND_IMAGE:-ghcr.io/change-me/recipeai-frontend:latest}"
    pull_policy: always
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    environment:
      PORT: "${FRONTEND_PORT:-8080}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.recipeai-frontend.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.recipeai-frontend.priority=${TRAEFIK_FRONTEND_ROUTER_PRIORITY:-50}"
      - "traefik.http.services.recipeai-frontend.loadbalancer.server.port=${FRONTEND_INTERNAL_PORT:-8080}"
    depends_on:
      - backend
    networks:
      - dokploy-network
      - frontend-backend

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data_final:/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-db

volumes:
  postgres_data_final:

networks:
  dokploy-network:
    external: true
  frontend-backend:
    driver: bridge
  backend-db:
    driver: bridge