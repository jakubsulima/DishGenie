services:
  backend:
    image: "${BACKEND_IMAGE:-ghcr.io/change-me/recipeai-backend:latest}"
    pull_policy: always
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    environment:
      POSTGRES_URL: "jdbc:postgresql://db:5432/${POSTGRES_DB}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/${POSTGRES_DB}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-prod}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      TRUSTED_PROXY_IPS: "${TRUSTED_PROXY_IPS:-}"
      JWT_COOKIE_SECURE: "${JWT_COOKIE_SECURE:-true}"
      JWT_COOKIE_SAME_SITE: "${JWT_COOKIE_SAME_SITE:-Lax}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - frontend-backend
      - backend-db

  frontend:
    image: "${FRONTEND_IMAGE:-ghcr.io/change-me/recipeai-frontend:latest}"
    pull_policy: always
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    environment:
      PORT: "${FRONTEND_PORT:-8080}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.recipeai-front.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.recipeai-front.entrypoints=websecure"
      - "traefik.http.routers.recipeai-front.tls=true"
      - "traefik.http.routers.recipeai-front.tls.certresolver=letsencrypt"
      - "traefik.http.services.recipeai-front.loadbalancer.server.port=${FRONTEND_PORT:-8080}"
      - "traefik.docker.network=dokploy-network"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dokploy-network
      - frontend-backend

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data_final:/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-db

volumes:
  postgres_data_final:

networks:
  dokploy-network:
    external: true
  frontend-backend:
    driver: bridge
  backend-db:
    driver: bridge